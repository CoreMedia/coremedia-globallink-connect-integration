name: Check Blocked Vulnerabilities

on:
  schedule:
    - cron: '0 7 * * 1' # Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency name (optional, overrides policy file)"
        required: false
        type: string
      blocked-range:
        description: "Blocked range (optional, requires dependency)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: check-blocked-vulnerabilities
  cancel-in-progress: false

env:
  NODE_VERSION: 24

jobs:
  check:
    name: Check Blocked Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run blocked vulnerability policy check
        working-directory: website
        run: |
          args=()

          if [[ -n "${{ inputs.dependency }}" ]]; then
            args+=(--dependency "${{ inputs.dependency }}")
          fi

          if [[ -n "${{ inputs.blocked-range }}" ]]; then
            args+=(--blocked-range "${{ inputs.blocked-range }}")
          fi

          node ./scripts/check-blocked-vulnerabilities.mjs "${args[@]}"
